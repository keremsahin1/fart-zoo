name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Find watch simulator
        id: simulator
        run: |
          SIMULATOR=$(xcrun simctl list devices available watchOS -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
              if 'watchOS' in runtime:
                  for d in devices:
                      if d['isAvailable']:
                          print(d['name'])
                          sys.exit(0)
          " 2>/dev/null || echo "")
          echo "simulator=$SIMULATOR" >> "$GITHUB_OUTPUT"
          echo "Using simulator: $SIMULATOR"

      - name: Build and test with coverage
        run: |
          xcodebuild test \
            -project FartZoo.xcodeproj \
            -scheme "FartZoo Watch App" \
            -destination 'platform=watchOS Simulator,name=${{ steps.simulator.outputs.simulator }}' \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult

      - name: Generate coverage badge
        run: |
          LINE=$(xcrun xccov view --report TestResults.xcresult | grep 'FartZoo Watch App.app')
          echo "xccov line: $LINE"
          COVERAGE=$(echo "$LINE" | grep -oE '[0-9]+\.[0-9]+%' | tr -d '%')
          if [ -z "$COVERAGE" ]; then
            # Try extracting fraction like (627/1817)
            NUMS=$(echo "$LINE" | grep -oE '\(([0-9]+)/([0-9]+)\)' | tr -d '()')
            if [ -n "$NUMS" ]; then
              NUM=$(echo "$NUMS" | cut -d'/' -f1)
              DEN=$(echo "$NUMS" | cut -d'/' -f2)
              COVERAGE=$(echo "scale=1; $NUM * 100 / $DEN" | bc)
            else
              COVERAGE=0
            fi
          fi
          echo "Coverage: ${COVERAGE}%"

          # Pick badge color based on coverage
          if (( $(echo "$COVERAGE >= 80" | bc -l) )); then COLOR="brightgreen"
          elif (( $(echo "$COVERAGE >= 60" | bc -l) )); then COLOR="yellow"
          elif (( $(echo "$COVERAGE >= 40" | bc -l) )); then COLOR="orange"
          else COLOR="red"; fi

          # Download badge SVG
          curl -s "https://img.shields.io/badge/coverage-${COVERAGE}%25-${COLOR}" > coverage-badge.svg

      - name: Commit coverage badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add coverage-badge.svg
          if git diff --cached --quiet; then
            echo "No badge change"
          else
            git commit -m "ci: update coverage badge [skip ci]"
            git push
          fi
