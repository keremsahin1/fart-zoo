name: FartZoo
options:
  bundleIdPrefix: com.fartzoo
  deploymentTarget:
    watchOS: "10.0"
  createIntermediateGroups: true

schemes:
  FartZoo Watch App:
    build:
      targets:
        FartZoo Watch App: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - name: FartZooTests
          parallelizable: true
    profile:
      config: Release
    archive:
      config: Release

targets:
  FartZoo Watch App:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: FartZoo Watch App
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fartzoo.watchkitapp
        SWIFT_VERSION: 5.9
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        TARGETED_DEVICE_FAMILY: "4"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: ""
        INFOPLIST_KEY_WKWatchOnly: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  FartZooTests:
    type: bundle.unit-test
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: FartZooTests
    dependencies:
      - target: FartZoo Watch App
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fartzoo.tests
        SWIFT_VERSION: 5.9
        GENERATE_INFOPLIST_FILE: YES
